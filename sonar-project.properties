sonar.projectKey=Zr0AM_dnd-app
sonar.organization=zr0am


# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=dnd-app
sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=**/node_modules/**,src/main.ts,**/*.spec.ts,public/**,src/environments/**
sonar.javascript.lcov.reportPaths=coverage/dnd-app/lcov.info

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8
